<!DOCTYPE html>
<html>
<head>
<title>Happy Birthday ❤️</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
background: linear-gradient(135deg,#ff9a9e,#fad0c4);
font-family: Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
color:white;
text-align:center;
}

.card{
background:rgba(0,0,0,0.35);
padding:40px;
border-radius:20px;
max-width:350px;
}

button{
padding:10px 20px;
border:none;
border-radius:10px;
background:white;
color:#ff4b7d;
font-weight:bold;
cursor:pointer;
}
</style>

</head>

<body>

<div class="card">

<h1>Happy Birthday ❤️</h1>

<p>Untuk kamu yang paling spesial di hidup aku</p>

<button onclick="msg()">Klik Pesan</button>

<p id="text"></p>

</div>

<script>
function msg(){
document.getElementById("text").innerHTML =
"Semoga hari kamu penuh kebahagiaan. Terima kasih sudah hadir di hidup aku ❤️";
}
</script>

</body>
</html>
