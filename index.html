<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday 💖</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#0f172a;
color:white;
overflow:hidden;
text-align:center;
}

/* BACKGROUND */
.stars{
position:fixed;
width:100%;
height:100%;
background:url("https://www.transparenttextures.com/patterns/stardust.png");
opacity:.4;
}

/* CONTAINER */
.container{
position:relative;
z-index:2;
padding:20px;
top:15vh;
}

/* TEXT */
.title{
font-size:26px;
margin-bottom:15px;
}

.message{
font-size:16px;
min-height:40px;
padding:0 10px;
}

/* BUTTON */
button{
margin-top:20px;
padding:12px 24px;
border:none;
border-radius:25px;
background:#ff4d6d;
color:white;
font-size:14px;
}

/* LOVE GRID (FIX MOBILE ❤️) */
.love-wrap{
position:fixed;
bottom:8vh;
left:50%;
transform:translateX(-50%);
width:300px;
height:260px;
display:grid;
grid-template-columns:repeat(7,1fr);
gap:6px;
}

/* CINEMATIC PHOTO ✨ */
.love-wrap img{
width:100%;
height:100%;
object-fit:cover;
border-radius:12px;

opacity:0;
transform:scale(1.4);
filter:blur(10px) brightness(.7);

transition:
opacity 1s ease,
transform 2.5s ease,
filter 2s ease;
}

/* SAAT MUNCUL */
.love-wrap img.show{
opacity:1;
transform:scale(1);
filter:blur(0px) brightness(1);
animation:softZoom 6s ease-in-out infinite;
}

/* ZOOM HALUS */
@keyframes softZoom{
0%{transform:scale(1)}
50%{transform:scale(1.05)}
100%{transform:scale(1)}
}

/* LETTER */
.letter{
position:fixed;
inset:0;
background:white;
color:#ff4d6d;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
padding:25px;
text-align:center;
opacity:0;
pointer-events:none;
transition:.5s;
}

.letter.show{
opacity:1;
pointer-events:auto;
}

.letter h1{
font-size:28px;
}

.letter p{
font-size:16px;
margin-top:10px;
}

/* CONFETTI */
.confetti{
position:absolute;
width:6px;
height:6px;
top:-10px;
animation:fall linear forwards;
}

@keyframes fall{
to{transform:translateY(110vh)}
}
</style>
</head>

<body>

<div class="stars"></div>

<div class="container">
<div class="title">Ada sesuatu buat kamu 💌</div>
<div id="message" class="message"></div>
<button onclick="start()">Mulai ✨</button>
</div>

<div id="love" class="love-wrap"></div>

<div id="letter" class="letter">
<h1>🎉 Happy Birthday 🎂</h1>
<p>Semoga semua impianmu tercapai ✨</p>
<p>Selalu bahagia & sehat 💖</p>
<p style="margin-top:10px">Terima kasih sudah hadir di hidup ini 😆</p>
</div>

<script>

/* ===== TYPEWRITER (LEBIH SLOW 🐢) ===== */
let texts=[
"Halo kamu 👋",
"Aku punya sesuatu...",
"Gak panjang kok 😆",
"Cuma mau bilang...",
"Happy Birthday 🎂"
]

let i=0,j=0
let msg=document.getElementById("message")

function type(){
if(i<texts.length){
if(j<texts[i].length){
msg.innerHTML+=texts[i][j++]
setTimeout(type,120)
}else{
setTimeout(()=>{
msg.innerHTML=""
i++; j=0;
type()
},1500)
}
}
}
type()

/* ===== FOTO (GANTI DI SINI) ===== */
let photos=[
"foto1.jpg",
"foto1.jpg",
"foto1.jpg",
"foto1.jpg",
"foto1.jpg",
"foto1.jpg",
"foto1.jpg",
"foto1.jpg",
"foto1.jpg",
"foto1.jpg",
"foto1.jpg",
"foto1.jpg",
"foto1.jpg",
"foto1.jpg",
"foto1.jpg",
"foto1.jpg",
"foto1.jpg",
"foto1.jpg"
]

/* SHAPE LOVE ❤️ */
let heartIndex=[
1,2,4,5,
0,3,6,
0,6,
1,5,
2,4,
3
]

function start(){

createLove()
showPhotos()

setTimeout(()=>{
openLetter()
confetti()
},7000)

}

/* CREATE GRID */
function createLove(){
let wrap=document.getElementById("love")
wrap.innerHTML=""

for(let i=0;i<18;i++){
let img=document.createElement("img")
img.src=photos[i % photos.length]
wrap.appendChild(img)
}
}

/* SHOW CINEMATIC */
function showPhotos(){

let imgs=document.querySelectorAll(".love-wrap img")

heartIndex.forEach((pos,idx)=>{
setTimeout(()=>{
imgs[pos].classList.add("show")
}, idx*500)
})

}

/* LETTER */
function openLetter(){
document.getElementById("letter").classList.add("show")
}

/* CONFETTI */
function confetti(){
for(let i=0;i<80;i++){
let c=document.createElement("div")
c.className="confetti"
c.style.left=Math.random()*100+"vw"
c.style.background=`hsl(${Math.random()*360},100%,50%)`
c.style.animationDuration=2+Math.random()*2+"s"
document.body.appendChild(c)
}
}

</script>

</body>
</html>
