```html id="viralmax1"
<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Birthday Surprise 🎂</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif}

body{
background:#0f172a;
color:white;
overflow:hidden;
text-align:center;
}

/* STAR + METEOR */
.stars{
position:fixed;
width:100%;
height:100%;
background:url("https://www.transparenttextures.com/patterns/stardust.png");
animation:move 80s linear infinite;
}

@keyframes move{
from{background-position:0 0}
to{background-position:2000px 2000px}
}

.meteor{
position:absolute;
width:3px;
height:80px;
background:linear-gradient(white,transparent);
transform:rotate(45deg);
animation:meteor 1s linear;
}

@keyframes meteor{
to{transform:translate(300px,300px) rotate(45deg);opacity:0}
}

/* MAIN */
.container{
position:relative;
z-index:2;
top:20vh;
padding:20px;
}

.title{
font-size:40px;
margin-bottom:20px;
}

.message{
font-size:20px;
min-height:40px;
}

/* BUTTON */
button{
margin-top:25px;
padding:12px 30px;
border:none;
border-radius:30px;
background:#ff4d6d;
color:white;
cursor:pointer;
}

/* BALLOON */
.balloon{
position:absolute;
bottom:-100px;
font-size:35px;
animation:float linear forwards;
}

@keyframes float{
to{transform:translateY(-120vh)}
}

/* CAKE */
.cake{
display:none;
margin-top:30px;
font-size:80px;
cursor:pointer;
}

.candle{
position:absolute;
top:-30px;
left:50%;
transform:translateX(-50%);
font-size:30px;
animation:flicker .3s infinite;
}

@keyframes flicker{
0%,100%{opacity:1}
50%{opacity:.4}
}

/* LETTER */
.letter{
position:fixed;
inset:0;
background:white;
color:#ff4d6d;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
padding:20px;
opacity:0;
pointer-events:none;
transition:.6s;
}

.letter.show{
opacity:1;
pointer-events:auto;
}

/* LOVE BAR */
.love{
width:80%;
height:10px;
background:#ddd;
margin-top:20px;
border-radius:10px;
overflow:hidden;
}

.loveFill{
height:100%;
width:0%;
background:#ff4d6d;
transition:1s;
}

/* CONFETTI */
.confetti{
position:absolute;
width:8px;
height:8px;
top:-10px;
animation:fall linear forwards;
}

@keyframes fall{
to{transform:translateY(110vh) rotate(720deg)}
}
</style>
</head>

<body>

<div class="stars"></div>

<div class="container">
<div class="title">Ada sesuatu buat kamu 👀</div>
<div id="message" class="message"></div>
<button onclick="nextStep()">Lanjut 👉</button>

<div id="cake" class="cake">
🎂
<div id="candle" class="candle">🕯️</div>
</div>

</div>

<div id="letter" class="letter">
<h1>🎉 Happy Birthday 🎂</h1>
<p>Semoga semua harapan kamu tercapai ✨</p>
<p>Always Happy & Healty 💖</p>
<p style="margin-top:10px">Terima kasih sudah jadi orang hebat 😆</p>

<div class="love">
<div id="loveFill" class="loveFill"></div>
</div>

<p style="margin-top:15px">💖 Level sayang: MAX</p>
</div>

<!-- MUSIC -->
<audio id="music" loop>
<source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3">
</audio>

<script>

/* TYPEWRITER */
let texts=[
"Halo kamu 👋",
"Aku cuma mau bilang sesuatu...",
"Hari ini spesial banget ✨",
"Karena...",
"Kamu ulang tahun 🎂"
]

let i=0,j=0
let msg=document.getElementById("message")

function type(){
if(i<texts.length){
if(j<texts[i].length){
msg.innerHTML+=texts[i][j++]
setTimeout(type,50)
}else{
setTimeout(()=>{msg.innerHTML="";i++;j=0;type()},1200)
}
}
}
type()

/* BALLOON */
setInterval(()=>{
let b=document.createElement("div")
b.className="balloon"
b.innerHTML="🎈"
b.style.left=Math.random()*100+"vw"
b.style.animationDuration=5+Math.random()*5+"s"
document.body.appendChild(b)
setTimeout(()=>b.remove(),10000)
},1000)

/* METEOR */
setInterval(()=>{
let m=document.createElement("div")
m.className="meteor"
m.style.left=Math.random()*100+"vw"
m.style.top=Math.random()*50+"vh"
document.body.appendChild(m)
setTimeout(()=>m.remove(),1000)
},2000)

/* STEP */
let step=0

function nextStep(){

step++

if(step==1){
document.getElementById("cake").style.display="block"
document.getElementById("music").play()
}

if(step==2){
alert("Tiup lilinnya dulu 🎂")
}

}

/* BLOW CANDLE */
document.getElementById("cake").onclick=()=>{
document.getElementById("candle").style.display="none"
confetti()
openLetter()
}

/* CONFETTI */
function confetti(){
for(let i=0;i<150;i++){
let c=document.createElement("div")
c.className="confetti"
c.style.left=Math.random()*100+"vw"
c.style.background=`hsl(${Math.random()*360},100%,50%)`
c.style.animationDuration=2+Math.random()*3+"s"
document.body.appendChild(c)
}
}

/* LETTER */
function openLetter(){
let l=document.getElementById("letter")
l.classList.add("show")

setTimeout(()=>{
document.getElementById("loveFill").style.width="100%"
},500)
}

</script>

</body>
</html>
