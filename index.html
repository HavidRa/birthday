<!DOCTYPE html>
<html>
<head>

<title>Happy Birthday ❤️</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
margin:0;
height:100vh;
background:linear-gradient(135deg,#ff9a9e,#fad0c4);
display:flex;
justify-content:center;
align-items:center;
font-family:Arial;
color:white;
text-align:center;
overflow:hidden;
}

.card{
background:rgba(0,0,0,0.4);
padding:30px;
border-radius:20px;
max-width:350px;
z-index:2;
}

button{
padding:10px 20px;
border:none;
border-radius:10px;
background:white;
color:#ff4b7d;
font-weight:bold;
cursor:pointer;
}

img{
width:200px;
border-radius:15px;
margin-top:10px;
}

#letter{
display:none;
margin-top:15px;
}

.heart{
position:fixed;
top:-10px;
color:red;
font-size:20px;
animation:fall linear infinite;
}

@keyframes fall{
0%{
transform:translateY(-10px);
}
100%{
transform:translateY(100vh);
}
}

</style>

</head>

<body>

<div class="card">

<h1>Happy Birthday ❤️</h1>

<p>Untuk kamu yang paling spesial di hidup aku</p>

<img src="FOTO_KAMU.jpg">

<br><br>

<button onclick="openLetter()">Buka Surat 💌</button>

<div id="letter">

<p>
Selamat ulang tahun sayang ❤️  
Terima kasih sudah hadir di hidup aku.  
Semoga semua mimpi kamu tercapai dan hari kamu selalu penuh kebahagiaan.  
Aku sayang kamu.
</p>

</div>

</div>

<audio autoplay loop>

<source src="LAGU.mp3" type="audio/mpeg">

</audio>

<script>

function openLetter(){
document.getElementById("letter").style.display="block"
}

function createHeart(){

const heart=document.createElement("div")

heart.classList.add("heart")

heart.innerHTML="❤️"

heart.style.left=Math.random()*100+"vw"

heart.style.animationDuration=(Math.random()*3+2)+"s"

document.body.appendChild(heart)

setTimeout(()=>{

heart.remove()

},5000)

}

setInterval(createHeart,300)

</script>

</body>

</html>
