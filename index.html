<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Happy Birthday 🎉</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:linear-gradient(135deg,#ff9a9e,#fad0c4,#fad0c4);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
color:white;
text-align:center;
}

.container{
max-width:600px;
}

.text{
font-size:40px;
font-weight:700;
opacity:0;
transform:translateY(30px);
animation:fadeUp 1s forwards;
}

.sub{
font-size:20px;
margin-top:15px;
opacity:0;
}

button{
margin-top:30px;
padding:12px 28px;
border:none;
border-radius:30px;
background:white;
color:#ff4d6d;
font-weight:600;
cursor:pointer;
font-size:16px;
transition:.3s;
}

button:hover{
transform:scale(1.1);
}

@keyframes fadeUp{
to{
opacity:1;
transform:translateY(0);
}
}

.emoji{
position:absolute;
font-size:24px;
animation:float 6s linear infinite;
}

@keyframes float{
0%{
transform:translateY(100vh);
opacity:0;
}
50%{
opacity:1;
}
100%{
transform:translateY(-10vh);
opacity:0;
}
}

.card{
position:fixed;
inset:0;
background:white;
color:#ff4d6d;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
opacity:0;
pointer-events:none;
transition:.6s;
}

.card.show{
opacity:1;
pointer-events:auto;
}

.card h1{
font-size:45px;
}

.card p{
margin-top:15px;
font-size:20px;
}

.confetti{
position:absolute;
width:10px;
height:10px;
background:red;
top:-10px;
animation:fall linear forwards;
}

@keyframes fall{
to{
transform:translateY(110vh) rotate(720deg);
}
}
</style>
</head>

<body>

<div class="container">
<div id="text" class="text">Tunggu sebentar... 🤔</div>
<div id="sub" class="sub"></div>
<button onclick="showCard()">Klik Aku 🎁</button>
</div>

<div class="card" id="card">
<h1>🎉 Happy Birthday 🎂</h1>
<p>Semoga panjang umur, sehat selalu,</p>
<p>rezeki lancar, dan makin keren 😎</p>
<p style="margin-top:10px;">+ jangan lupa traktir ya 😆</p>
</div>

<script>

let texts=[
"Halo kamu 👋",
"Iya kamu yang lagi baca ini 😆",
"Hari ini hari spesial loh ✨",
"Ada yang ulang tahun ya? 🎂",
"Yup... kamu! 🫵",
"Happy Birthday 🎉"
]

let i=0
let text=document.getElementById("text")
let sub=document.getElementById("sub")

function changeText(){

if(i<texts.length){
text.style.opacity=0

setTimeout(()=>{
text.innerHTML=texts[i]
text.style.opacity=1
i++
},500)

setTimeout(changeText,2000)
}

}

setTimeout(changeText,1500)


function showCard(){

document.getElementById("card").classList.add("show")

confetti()

}

function confetti(){

for(let i=0;i<120;i++){

let conf=document.createElement("div")
conf.className="confetti"

conf.style.left=Math.random()*100+"vw"
conf.style.background=`hsl(${Math.random()*360},100%,50%)`
conf.style.animationDuration=2+Math.random()*3+"s"

document.body.appendChild(conf)

}

}

function floatingEmoji(){

let emoji=["🎉","🎂","✨","🎈","🥳"]

let e=document.createElement("div")
e.className="emoji"
e.innerHTML=emoji[Math.floor(Math.random()*emoji.length)]
e.style.left=Math.random()*100+"vw"

document.body.appendChild(e)

setTimeout(()=>{e.remove()},6000)

}

setInterval(floatingEmoji,700)

</script>

</body>
</html>
